name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check whether this version needs publishing
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            if [ "$TAG" != "v$VERSION" ]; then
              echo "::error::Tag $TAG does not match package.json version $VERSION"
              exit 1
            fi
          fi
          PUBLISHED=$(npm view "@asleep-ai/react-native-alarm@$VERSION" version 2>/dev/null || true)
          if [ "$PUBLISHED" = "$VERSION" ]; then
            echo "::error::Version $VERSION is already on npm - bump package.json before publishing"
            exit 1
          fi
          echo "Publishing version $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Run typecheck
        run: pnpm run typecheck

      - name: Update npm for trusted publishing
        run: npm install -g npm@latest

      - name: Publish to npm (OIDC trusted publishing)
        run: npm publish --access public

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "Release $TAG already exists - skipping"
            exit 0
          fi
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Release $TAG" \
            --notes "## Changes

          See the [commit history](https://github.com/asleep-ai/react-native-alarm/commits/main) for details.

          ## Installation

          \`\`\`bash
          npm install @asleep-ai/react-native-alarm@${{ steps.version.outputs.version }}
          \`\`\`"
