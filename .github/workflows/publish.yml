name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pull-requests: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check whether this version needs publishing
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            if [ "$TAG" != "v$VERSION" ]; then
              echo "::error::Tag $TAG does not match package.json version $VERSION"
              exit 1
            fi
          fi
          PUBLISHED=$(npm view "@asleep-ai/react-native-alarm@$VERSION" version 2>/dev/null || true)
          if [ "$PUBLISHED" = "$VERSION" ]; then
            echo "::error::Version $VERSION is already on npm - bump package.json before publishing"
            exit 1
          fi
          echo "Publishing version $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Run typecheck
        run: pnpm run typecheck

      # Runs before npm publish: a failure here must not leave the version
      # published on npm with no tag/release, which would make the workflow
      # non-rerunnable (the version check refuses already-published versions).
      - name: Generate release notes
        id: notes
        uses: asleep-ai/actions/release-notes@release-notes/v1
        with:
          # HEAD works for both tag push and workflow_dispatch (where the
          # v* tag does not exist yet); the previous tag is auto-derived.
          current-tag: HEAD
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          system-prompt: |
            Release notes for @asleep-ai/react-native-alarm, a React Native alarm library.
            Output markdown only - no preamble, no trailing commentary.
            Sections: '## New Features', '## Improvements', '## Bug Fixes', '## Internal Changes'.
            Omit empty sections; do not invent content.
            Rewrite commit subjects as user-facing bullets using the PR description when present.
            Wrap code identifiers and paths in backticks; preserve PR references (#NNN).
            Ignore Co-Authored-By trailers and merge artefacts.

      - name: Update npm for trusted publishing
        run: npm install -g npm@latest

      - name: Publish to npm (OIDC trusted publishing)
        run: npm publish --access public

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "Release $TAG already exists - skipping"
            exit 0
          fi
          {
            echo ""
            echo "## Installation"
            echo ""
            echo '```bash'
            echo "npm install @asleep-ai/react-native-alarm@${{ steps.version.outputs.version }}"
            echo '```'
          } >> "${{ steps.notes.outputs.path }}"
          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Release $TAG" \
            --notes-file "${{ steps.notes.outputs.path }}"
